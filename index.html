<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plant & Tool Checkout</title>
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; padding: 20px; text-align: center; background: #f0f2f5; color: #1c1e21; }
        .container { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 8px 16px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        h2 { color: #0078d4; margin-bottom: 5px; }
        p { color: #606770; margin-bottom: 20px; font-size: 14px; }
        .asset-box { background: #e7f3ff; color: #0078d4; padding: 12px; border-radius: 8px; font-weight: bold; margin-bottom: 20px; border: 1px solid #bbdefb; }
        input, select, button { width: 100%; padding: 14px; margin: 10px 0; font-size: 16px; border-radius: 8px; border: 1px solid #ccd0d5; box-sizing: border-box; outline: none; }
        input:focus, select:focus { border-color: #0078d4; box-shadow: 0 0 0 2px rgba(0,120,212,0.2); }
        button { background: #0078d4; color: white; border: none; font-weight: bold; cursor: pointer; transition: background 0.2s; margin-top: 20px; }
        button:active { background: #005a9e; transform: scale(0.98); }
        .btn-secondary { background: #f0f2f5; color: #1c1e21; border: 1px solid #ccd0d5; margin-top: 5px; margin-bottom: 15px; }
        .btn-working { background: #28a745; margin-top: 10px; }
        .btn-faulty { background: #dc3545; margin-top: 10px; }
        .btn-reset { background: #6c757d; font-size: 12px; padding: 8px; margin-top: 30px; opacity: 0.7; }
        .btn-next { background: #0078d4; color: white; font-weight: bold; padding: 18px; font-size: 18px; margin-top: 10px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        #status { margin-top: 15px; font-weight: bold; font-size: 14px; min-height: 20px; }
        .hidden { display: none; }
        #reader { width: 100%; margin-top: 10px; border-radius: 8px; overflow: hidden; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Renelec Plant Logging</h2>
        <p>Enter name & select site</p>
        <p>If site is missing from the list, use 'My Site Is Not listed' button and type the name of the missing site</p>
        
        <div class="asset-box">
            <div id="assetDisplay">Identifying Equipment...</div>
        </div>

        <div id="reader" class="hidden"></div>

        <div id="restOfForm">
            <input type="text" id="workerName" placeholder="Enter Your Name">
            <select id="jobSite" onchange="handleSiteSelection()">
                <option value="" disabled selected>Loading Active Contracts...</option>
            </select>
            <button type="button" id="notListedBtn" class="btn-secondary" onclick="showMissingSiteBox()">My site is not listed</button>

            <div id="conditionSection" class="hidden">
                <p style="margin-bottom: 5px; font-weight: bold;">Condition of Equipment:</p>
                <button type="button" class="btn-working" onclick="setCondition('Working')">✅ Working</button>
                <button type="button" class="btn-faulty" onclick="setCondition('Faulty')">❌ Faulty</button>
            </div>

            <div id="faultSection" class="hidden">
                <input type="text" id="faultDesc" placeholder="Describe the fault...">
            </div>

            <button id="submitBtn" class="hidden" onclick="submitScan()">Confirm Checkout</button>
        </div>

        <div id="successSection" class="hidden" style="margin-top: 20px;">
            <div id="status"></div>
            <button type="button" class="btn-next" onclick="resetForNext()">📷 Scan Next Item</button>
        </div>

        <div id="missingSiteSection" class="hidden" style="background-color: #ffeaea; padding: 15px; border-radius: 8px; border-left: 4px solid red; margin-top: 15px; text-align: left;">
            <h4 style="margin-top: 0; color: #d32f2f;">Request a New Site</h4>
            <input type="text" id="newSiteName" placeholder="Type missing site name...">
            <button type="button" style="background: #d32f2f;" onclick="sendAlert()">Send Alert & Wait</button>
            <button type="button" class="btn-secondary" onclick="resetForm()">Back</button>
        </div>

        <div id="globalStatus" style="margin-top: 15px; font-weight: bold; font-size: 14px;"></div>
        <button type="button" class="btn-reset" onclick="resetForm()">Reset Form</button>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        let assetId = urlParams.get('asset') || "Unknown Asset";
        document.getElementById('assetDisplay').innerText = "Asset ID: " + assetId;

        let selectedCondition = "";
        let html5QrCode;

        fetch('https://raw.githubusercontent.com/NWRenGW/Plant-Tracker/main/sites.json') 
            .then(res => res.json())
            .then(data => {
                let dropdown = document.getElementById('jobSite');
                dropdown.innerHTML = '<option value="" disabled selected>Select site here</option>';
                data.forEach(item => {
                    let opt = document.createElement('option');
                    opt.value = item.SiteName; 
                    opt.innerText = item.SiteName;
                    dropdown.appendChild(opt);
                });
            })
            .catch(err => {
                document.getElementById('jobSite').innerHTML = '<option value="" disabled>Error loading contracts</option>';
            });

        function startScanner() {
            document.getElementById('reader').classList.remove('hidden');
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start(
                { facingMode: "environment" },
                { fps: 10, qrbox: { width: 250, height: 250 } },
                (decodedText) => {
                    try {
                        const url = new URL(decodedText);
                        const newId = url.searchParams.get("asset");
                        if (newId) {
                            assetId = newId;
                            document.getElementById('assetDisplay').innerText = "Asset ID: " + assetId;
                            stopScanner();
                        }
                    } catch (e) { alert("Not a valid Renelec QR code."); }
                },
                () => {}
            ).catch(err => alert("Camera error: " + err));
        }

        function stopScanner() {
            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    document.getElementById('reader').classList.add('hidden');
                });
            }
        }

        function handleSiteSelection() {
            document.getElementById('notListedBtn').classList.add('hidden');
            document.getElementById('conditionSection').classList.remove('hidden');
        }

        function setCondition(status) {
            selectedCondition = status;
            const faultBox = document.getElementById('faultSection');
            const submitBtn = document.getElementById('submitBtn');
            if (status === 'Faulty') { faultBox.classList.remove('hidden'); } 
            else { faultBox.classList.add('hidden'); document.getElementById('faultDesc').value = ""; }
            submitBtn.classList.remove('hidden');
            document.getElementById('globalStatus').innerText = "Selected: " + status;
        }

        function resetForm() { location.reload(); }

        function resetForNext() {
            document.getElementById('successSection').classList.add('hidden');
            document.getElementById('restOfForm').style.display = "block";
            document.getElementById('globalStatus').innerText = "";
            assetId = "Unknown Asset";
            document.getElementById('assetDisplay').innerText = "Asset ID: Identifying...";
            startScanner();
        }

        function showMissingSiteBox() {
            document.getElementById("restOfForm").style.display = "none";
            document.getElementById("missingSiteSection").classList.remove('hidden');
        }

        function sendAlert() {
            let newSite = document.getElementById("newSiteName").value;
            let alertBox = document.getElementById("missingSiteSection");
            if (newSite.trim() === "") { alert("Please type a site name first!"); return; }
            alertBox.innerHTML = "<h4 style='margin-top: 0;'>Request a New Site</h4><p>⏳ Sending alert...</p>";

            const alertFlowUrl = 'https://default267b2c46e98b42ef93ce19c08b7664.4d.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/3f5a928b87b34145bae782d083e060bc/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=hvYVAXPVBAUbeEG-sMNSwDEAKQKA_W0Du77BZF9YttQ';

            fetch(alertFlowUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ assetId: assetId, newSite: newSite })
            }).then(response => {
                if (response.ok) {
                    alertBox.innerHTML = "<h4 style='color: green;'>✅ Alert Sent!</h4><p>The team has been notified.</p>";
                } else { throw new Error(); }
            }).catch(() => {
                alertBox.innerHTML = "<h4 style='color: red;'>❌ Error Sending Alert</h4>";
            });
        }

        function submitScan() {
            const worker = document.getElementById('workerName').value.trim();
            const site = document.getElementById('jobSite').value;
            const fault = document.getElementById('faultDesc').value;
            const globalStatus = document.getElementById('globalStatus');
            const statusInner = document.getElementById('status');
            const btn = document.getElementById('submitBtn');

            if (!worker || !site) { alert("Please enter name and site."); return; }
            globalStatus.innerText = "⏳ Saving...";
            btn.disabled = true;

            const flowUrl = 'https://default267b2c46e98b42ef93ce19c08b7664.4d.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/fe383591210545c98ad43e00eec67289/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=6ws596pRG-pkrDUdxphn4rbGwyPdc_g2v2Ql-Onnczo';

            fetch(flowUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    asset: assetId,
                    operative: worker,
                    site: site,
                    condition: selectedCondition,
                    fault: fault,
                    lat: "Skipped", 
                    lon: "Skipped"
                })
            }).then(response => {
                if (response.ok) {
                    document.getElementById('restOfForm').style.display = "none";
                    document.getElementById('successSection').classList.remove('hidden');
                    statusInner.innerText = "✅ Success! Asset Logged.";
                    statusInner.style.color = "green";
                    globalStatus.innerText = "";
                } else { globalStatus.innerText = "❌ Error: Could not save."; }
            }).catch(() => { globalStatus.innerText = "❌ Network Error."; }).finally(() => { btn.disabled = false; });
        }
    </script>
</body>
</html>
